name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Run tests
        run: cd server && bun test --preload ./src/__tests__/setup.ts

      - name: Type check
        run: cd server && bunx tsc --noEmit
